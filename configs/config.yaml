experiment:
  name: "GBRBM_MovieLens_Tuned"  # Change to "GBRBM_MovieLens_Base" for base hyperparameters
  seed: 42
  device: "cuda"              # 'cuda' or 'cpu'
  val_every_n_epochs: 5       # Run evaluation loop on held-out targets every N epochs

dataset:
  path: "ml-latest-small/ratings.csv"
  train_split: 0.8            # User-level split ratio
  test_ratio: 0.2             # Within-user rating hold-out ratio (gamma)

model:
  hidden_units: 256           # revert to base config: 128
  sigma: 0.05                 # revert to base config: 0.1

hyperparameters:
  epochs: 40
  batch_size: 64
  learning_rate: 0.005
  cd_steps: 3                 # Contrastive Divergence steps (k), revert to base config: 1
  l2_reg: 0.001              # Weight decay coefficient, revert to base config: 0.0002

metrics:
  top_k: 10                   # K parameter for HitRate@K, Precision@K, Recall@K